<form [formGroup]="recipeForm">

  <!-- Servings -->
    <mat-form-field appearance="outline">
        <mat-label>Name</mat-label>

        <input
        matInput
        type="string"
        formControlName="name"
        />
    </mat-form-field>
    
  <mat-form-field appearance="outline">
    <mat-label>Portionen</mat-label>

    <input
      matInput
      type="number"
      formControlName="servings"
    />
  </mat-form-field>

  <!-- Ingredients Section -->

  <h3>Ingredients</h3>

  <div formArrayName="ingredients">

    <div
      *ngFor="let ing of ingredientForms.controls; let i = index"
      [formGroupName]="i"
      style="display:flex; gap:10px; align-items:center;"
    >

      <!-- Ingredient Select -->

      <mat-form-field>

        <mat-label>Ingredient</mat-label>

        <input
            matInput
            type="text"
            formControlName="ingredient"
            [matAutocomplete]="auto"
        >

        <mat-autocomplete
            #auto="matAutocomplete"
            [displayWith]="displayIngredient"
        >

            <mat-option
            *ngFor="
                let item of filteredIngredients[i] | async
            "
            [value]="item"
            >
            {{ item.name }}
            </mat-option>

        </mat-autocomplete>

        </mat-form-field>

      <!-- Amount -->

      <mat-form-field appearance="outline">

        <mat-label>Menge</mat-label>

        <input
          matInput
          type="number"
          formControlName="amount"
        />

        <span matSuffix>
          {{ getUnit(i) }}
        </span>

      </mat-form-field>

      <!-- Remove Button -->

      <button
        mat-icon-button
        color="warn"
        (click)="removeIngredientRow(i)"
      >
        <mat-icon>delete</mat-icon>
      </button>

    </div>

  </div>

  <!-- Add Ingredient -->

  <button
    mat-raised-button
    color="primary"
    type="button"
    (click)="addIngredientRow()"
  >
    Add Ingredient
  </button>

  <!-- Instructions -->

  <h3>Instructions</h3>

  <mat-form-field
    appearance="outline"
    style="width:100%;"
  >

    <mat-label>Recipe Instructions</mat-label>

    <textarea
      matInput
      rows="6"
      formControlName="instructions"
    ></textarea>

  </mat-form-field>

  <!-- Submit -->

  <br>

  <button
    mat-raised-button
    color="accent"
    (click)="submit()"
  >
    Submit Recipe
  </button>

</form>
